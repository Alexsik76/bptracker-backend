services:
  db:
    image: postgres:16
    container_name: bptracker-db
    environment:
      POSTGRES_USER: bp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bp_tracker
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bp_user -d bp_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: bptracker-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=db;Database=bp_tracker;Username=bp_user;Password=${POSTGRES_PASSWORD}"
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://bptracker.home.vn.ua}
      FIDO2_DOMAIN: ${FIDO2_DOMAIN:-bptracker.home.vn.ua}
      GEMINI_MODEL: ${GEMINI_MODEL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-BP Tracker}
      SMTP_TLS: ${SMTP_TLS:-true}
      APP_URL: ${APP_URL:-https://bptracker.home.vn.ua}
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  pg-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: bptracker-pg-backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: bp_tracker
      POSTGRES_USER: bp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "0 3 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
