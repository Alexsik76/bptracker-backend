services:
  db:
    image: postgres:16
    container_name: bptracker-db
    environment:
      POSTGRES_USER: bp_user
      POSTGRES_PASSWORD: bp_password
      POSTGRES_DB: bp_tracker
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: bptracker-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=bp_tracker;Username=bp_user;Password=bp_password"
      GOOGLE_SCRIPT_URL: $GOOGLE_SCRIPT_URL
      GEMINI_API_KEY: $GEMINI_API_KEY
      CORS_ORIGINS: ${CORS_ORIGINS:-https://bptracker.home.vn.ua}
      GEMINI_MODEL: $GEMINI_MODEL
    ports:
      - "5000:8080"
    depends_on:
      - db

  pg-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: bptracker-pg-backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: bp_tracker
      POSTGRES_USER: bp_user
      POSTGRES_PASSWORD: bp_password
      SCHEDULE: "0 3 * * *"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 3
    volumes:
      - ./backups:/backups
    depends_on:
      - db

volumes:
  pgdata:
